<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="88" fill="#0E0D0B"/>
  <!-- K — stem -->
  <rect x="90" y="100" width="52" height="312" rx="10" fill="#C9B830"/>
  <!-- K — upper arm (rotates up-right from vertex at stem center) -->
  <rect x="142" y="230" width="295" height="52" rx="10"
        transform="rotate(-28 142 256)" fill="#C9B830"/>
  <!-- K — lower arm (mirrors upper) -->
  <rect x="142" y="230" width="295" height="52" rx="10"
        transform="rotate(28 142 256)" fill="#C9B830"/>
</svg>
